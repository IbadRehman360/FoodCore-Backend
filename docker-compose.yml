services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodcure-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres
      - mongo
      - redis
    networks:
      - foodcure-network

  postgres:
    image: postgres:16-alpine
    container_name: foodcure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - foodcure-network

  mongo:
    image: mongo:7-jammy
    container_name: foodcure-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - foodcure-network

  redis:
    image: redis:7-alpine
    container_name: foodcure-redis
    restart: unless-stopped
    command: sh -c "[ -n \"$$REDIS_PASSWORD\" ] && redis-server --requirepass $$REDIS_PASSWORD || redis-server"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - foodcure-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  foodcure-network:
    driver: bridge
